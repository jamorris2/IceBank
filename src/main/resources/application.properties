spring.application.name=BankingApp

server.port=${PORT:8082}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/icebank}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.initialization-fail-timeout=60000

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Mailtrap Settings
mailtrap.api.token=${MAILTRAP_API_TOKEN}

# Swagger UI Base URL
springdoc.swagger-ui.path=/swagger-ui.html

# Base URL for generated links
app.base.url=${APP_BASE_URL:http://localhost:8082}
support.email=${SUPPORT_EMAIL:support@icebank.app}

server.forward-headers-strategy=framework
server.tomcat.redirect-context-root=true
server.use-forward-headers=true
